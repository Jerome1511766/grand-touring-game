<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Touring - Racing Game</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Arial', sans-serif;
  background: #000;
  overflow: hidden;
  color: #fff;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* HUD - Heads Up Display */
#hud {
  position: absolute;
  top: 20px;
  left: 20px;
  background: rgba(0, 0, 0, 0.7);
  border: 2px solid #00ff00;
  padding: 20px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  z-index: 100;
  min-width: 250px;
}

#hud div {
  margin: 8px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#hud span {
  color: #00ff00;
  font-size: 18px;
}

#speed-bar {
  width: 150px;
  height: 10px;
  background: #333;
  border: 1px solid #00ff00;
  margin-top: 5px;
  position: relative;
  overflow: hidden;
}

#speed-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #00ff00, #ffff00, #ff6600);
  width: 0%;
  transition: width 0.05s;
}

/* Mini Map */
#minimap {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 180px;
  height: 180px;
  background: rgba(0, 0, 0, 0.8);
  border: 2px solid #00ff00;
  border-radius: 10px;
  z-index: 100;
}

#minimap-canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* Controls */
#controls {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.8);
  border: 2px solid #00ff00;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  z-index: 100;
}

.control-group {
  margin: 10px 0;
}

button {
  background: #00ff00;
  color: #000;
  border: none;
  padding: 12px 24px;
  margin: 5px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.2s;
}

button:hover {
  background: #00dd00;
  transform: scale(1.05);
}

button:active {
  background: #00aa00;
  transform: scale(0.95);
}

/* Game Over Screen */
#gameOver {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0, 0, 0, 0.95);
  border: 3px solid #ff6600;
  padding: 40px;
  border-radius: 15px;
  text-align: center;
  z-index: 200;
  display: none;
  min-width: 400px;
}

#gameOver h1 {
  font-size: 48px;
  margin-bottom: 20px;
  color: #ff6600;
}

#gameOver p {
  font-size: 24px;
  margin: 15px 0;
}

#gameOver button {
  font-size: 18px;
  padding: 15px 40px;
  margin-top: 30px;
}

/* Mobile Controls */
#mobileControls {
  display: none;
  position: absolute;
  bottom: 20px;
  left: 20px;
  z-index: 100;
}

.mobile-btn {
  width: 70px;
  height: 70px;
  border-radius: 10px;
  background: rgba(0, 255, 0, 0.6);
  border: 2px solid #00ff00;
  font-size: 12px;
  font-weight: bold;
  color: #000;
  cursor: pointer;
  margin: 5px;
}

/* Checkpoint Indicator */
#checkpoint-indicator {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 48px;
  color: #00ff00;
  text-shadow: 0 0 20px #00ff00;
  font-weight: bold;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}

#checkpoint-indicator.show {
  opacity: 1;
}

/* Responsive */
@media (max-width: 768px) {
  #hud {
    top: 10px;
    left: 10px;
    font-size: 12px;
    padding: 10px;
    min-width: 180px;
  }

  #hud span {
    font-size: 14px;
  }

  #minimap {
    width: 120px;
    height: 120px;
    top: 10px;
    right: 10px;
  }

  #controls {
    bottom: 20px;
    padding: 15px;
  }

  button {
    padding: 8px 16px;
    font-size: 12px;
    margin: 2px;
  }

  #mobileControls {
    display: flex;
    flex-wrap: wrap;
    width: 160px;
  }

  .mobile-btn {
    width: 50px;
    height: 50px;
    font-size: 10px;
  }
}
</style>
</head>
<body>

<div id="hud">
  <div>Speed: <span id="speed">0</span> km/h</div>
  <div id="speed-bar"><div id="speed-bar-fill"></div></div>
  <div>Credits: <span id="credits">0</span></div>
  <div>Checkpoint: <span id="checkpoint">0</span>/10</div>
  <div>Weather: <span id="weather">Clear</span></div>
  <div>Laps: <span id="laps">0</span></div>
</div>

<div id="minimap">
  <canvas id="minimap-canvas"></canvas>
</div>

<div id="controls">
  <div class="control-group">
    <button onclick="input.gas()" id="gasBtn">⬆️ GAS</button>
    <button onclick="input.brake()" id="brakeBtn">⬇️ BRAKE</button>
  </div>
  <div class="control-group">
    <button onclick="input.turn(-1)" id="leftBtn">⬅️ LEFT</button>
    <button onclick="input.turn(1)" id="rightBtn">RIGHT ➡️</button>
  </div>
  <div class="control-group">
    <button onclick="toggleSpeed()">⚡ Boost Speed</button>
    <button onclick="resetGame()">🔄 Reset</button>
  </div>
</div>

<div id="mobileControls">
  <button class="mobile-btn" onmousedown="input.gas()" onmouseup="input.stopGas()">GAS</button>
  <button class="mobile-btn" onmousedown="input.brake()" onmouseup="input.stopBrake()">BRAKE</button>
  <button class="mobile-btn" onmousedown="input.turn(-1)" onmouseup="input.stopTurn()">LEFT</button>
  <button class="mobile-btn" onmousedown="input.turn(1)" onmouseup="input.stopTurn()">RIGHT</button>
</div>

<div id="checkpoint-indicator"></div>

<div id="gameOver">
  <h1>RACE FINISHED! 🏁</h1>
  <p id="finalStats"></p>
  <button onclick="location.reload()">Play Again</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="game.js"></script>

</body>
</html>
